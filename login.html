<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
     <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-wrapper">
                 <a href="index.html" class="logo" data-aos="fade-right">
                    <img src="images/logo.webp" alt="Stackly Logo" class="logo-img" width="50" height="50">
                    <span class="logo-text">STACKLY</span>
                </a>
                
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                
                <ul class="nav-menu" id="navMenu">
                    <li class="nav-item dropdown">
                        <a href="#" class="nav-link">Home <i class="fas fa-chevron-down"></i></a>
                        <ul class="dropdown-menu">
                            <li><a href="home2.html">Home 2</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                    <li class="nav-item"><a href="services.html" class="nav-link">Services</a></li>
                    <li class="nav-item"><a href="blog.html" class="nav-link">Blog</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="login-container">
        <div class="login-left" data-aos="fade-right">
            <div class="login-branding">
                <div class="logo-large">
                    <img src="images/logo.webp" alt="Stackly Logo" class="logo-img" width="50" height="50">
                    <h1>STACKLY</h1>
                </div>
                <p class="login-tagline">Secure Payment Gateway Solutions</p>
                <div class="login-features">
                    <div class="login-feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Bank-Level Security</span>
                    </div>
                    <div class="login-feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Real-Time Analytics</span>
                    </div>
                    <div class="login-feature">
                        <i class="fas fa-check-circle"></i>
                        <span>24/7 Support</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-right" data-aos="fade-left">
            <div class="login-form-container">
                <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

                <h2>Welcome Back</h2>
                <p class="login-subtitle">Sign in to access your dashboard</p>

                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="loginAs">Login As</label>
                        <select id="loginAs" class="form-select" required>
                            <option value="">Select User Type</option>
                            <option value="merchant">Merchant</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-with-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Enter your password" required>
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="404.html" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-login-submit">
                        Sign In <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <button type="button" class="btn btn-google" onclick="window.location.href='404.html'">
                        <i class="fab fa-google"></i> Sign in with Google
                    </button>

                    <p class="signup-link">
                        Don't have an account? <a href="404.html">Sign up</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <div class="login-particles"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Login form validation and redirect
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginAs = document.getElementById('loginAs').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }
            
            // Password validation (minimum 6 characters)
            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }
            
            // Check if login type is selected
            if (!loginAs) {
                alert('Please select a login type');
                return;
            }
            
            // Redirect based on user type
            if (loginAs === 'merchant') {
                window.location.href = 'dashboard-merchant.html';
            } else if (loginAs === 'admin') {
                window.location.href = 'dashboard-admin.html';
            }
        });

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
