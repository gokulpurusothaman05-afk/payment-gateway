<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link rel="icon" href="images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="error-page">
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <div class="error-container">
        <a href="index.html" class="logo" style="justify-content:center;margin-bottom:40px" data-aos="fade-down">
            <img src="images/logo.svg" alt="Stackly" class="logo-img" width="50" height="50">
            <span class="logo-text">STACK<span>LY</span></span>
        </a>
        <div class="error-content" data-aos="zoom-in">
            <div class="error-number animate__animated animate__pulse animate__infinite animate__slower">404</div>
            <h1 class="error-title" data-aos="fade-up" data-aos-delay="200">Page Not Found</h1>
            <p class="error-message" data-aos="fade-up" data-aos-delay="300">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="error-actions" data-aos="fade-up" data-aos-delay="400">
                <a href="index.html" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Back to Home</a>
                <a href="contact.html" class="btn btn-secondary btn-lg"><i class="fas fa-envelope"></i> Contact Support</a>
            </div>
        </div>
        <div id="countdown" class="countdown-timer" style="margin-top:48px" data-aos="fade-up" data-aos-delay="500"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
